<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - TopZone</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <div class="login-page">
        <div class="login-card">
            <h1>Đăng nhập</h1>
            <p>Vui lòng nhập tài khoản để tiếp tục.</p>
            <form action="index.html" method="get">
                <label for="email">Email hoặc số điện thoại</label>
                <input type="text" id="email" placeholder="Nhập email hoặc số điện thoại">
                <label for="password">Mật khẩu</label>
                <input type="password" id="password" placeholder="Nhập mật khẩu">
                <button type="submit">Đăng nhập</button>
            </form>
            <p class="login-note">Chưa có tài khoản? <a href="index.html">Về trang chủ</a></p>
        </div>
    </div>
</body>
</html>
